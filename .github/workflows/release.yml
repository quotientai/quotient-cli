name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)build, e.g. v0.2.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-latest
            bun_target: bun-darwin-arm64
            ext: ""
            archive_cmd: tar
          - target: darwin-x64
            os: macos-13
            bun_target: bun-darwin-x64
            ext: ""
            archive_cmd: tar
          - target: linux-x64
            os: ubuntu-latest
            bun_target: bun-linux-x64
            ext: ""
            archive_cmd: tar
          - target: linux-arm64
            os: ubuntu-latest
            bun_target: bun-linux-arm64
            ext: ""
            archive_cmd: tar
          - target: windows-x64
            os: windows-latest
            bun_target: bun-windows-x64
            ext: ".exe"
            archive_cmd: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Resolve tag + version
        id: meta
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compile
        shell: bash
        run: |
          bun build --compile --minify --sourcemap \
            --target=${{ matrix.bun_target }} \
            ./src/index.ts \
            --outfile qt${{ matrix.ext }}

      - name: Package (tar.gz)
        if: matrix.archive_cmd == 'tar'
        shell: bash
        run: |
          tar -czf "qt-${{ steps.meta.outputs.version }}-${{ matrix.target }}.tar.gz" \
            qt README.md LICENSE

      - name: Package (zip)
        if: matrix.archive_cmd == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path qt.exe, README.md, LICENSE `
            -DestinationPath "qt-${{ steps.meta.outputs.version }}-${{ matrix.target }}.zip"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            qt-*.tar.gz
            qt-*.zip
          fail_on_unmatched_files: true
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
